---
# Horizontal Pod Autoscaler for Games Server
# Scales based on CPU and memory utilization

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: games-server-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: games-server
  minReplicas: 2
  maxReplicas: 10

  metrics:
  # CPU Utilization Metric
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Memory Utilization Metric
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  behavior:
    # Scale Down Policy
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minute cooldown
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Min  # Use most conservative policy

    # Scale Up Policy
    scaleUp:
      stabilizationWindowSeconds: 0    # No delay for scale up
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max  # Use most aggressive policy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: games-server
  namespace: default
spec:
  replicas: 2  # Initial replicas (HPA will adjust)
  selector:
    matchLabels:
      app: games-server

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployment

  template:
    metadata:
      labels:
        app: games-server
    spec:
      terminationGracePeriodSeconds: 30  # 30 second graceful shutdown

      containers:
      - name: games-server
        image: games-server:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000
          name: http
          protocol: TCP

        env:
        - name: NODE_ENV
          value: production
        - name: LOG_LEVEL
          value: info
        - name: REDIS_URL
          value: redis://redis:6379
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: games-secrets
              key: database-url

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        # Liveness Probe: Kill unhealthy containers
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness Probe: Remove from load balancer if not ready
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2

        # Graceful Shutdown
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - sleep 15  # Allow time for load balancer to drain connections

        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true

      # Pod Disruption Budget (prevent eviction during drain)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - games-server
              topologyKey: kubernetes.io/hostname

      volumes:
      - name: config
        configMap:
          name: games-server-config

---
apiVersion: v1
kind: Service
metadata:
  name: games-server-svc
  namespace: default
  labels:
    app: games-server
spec:
  type: LoadBalancer

  selector:
    app: games-server

  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http

  # Session Affinity (optional: for sticky sessions)
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

  # Load Balancer Configuration
  externalTrafficPolicy: Local  # Preserve source IP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: games-server-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 3000
      host: 0.0.0.0
      keepAlive: true

    database:
      poolSize: 20
      idleTimeout: 30000
      connectionTimeout: 5000

    redis:
      maxRetries: 3
      retryDelayMs: 100

    logging:
      level: info
      format: json

    health:
      readinessTimeout: 5000
      livenessTimeout: 5000
