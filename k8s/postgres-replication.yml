---
# PostgreSQL Replication Configuration
# Primary-Replica streaming replication with automatic failover

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-primary-config
  namespace: default
data:
  postgresql.conf: |
    # Replication Settings
    wal_level = replica
    max_wal_senders = 10
    wal_keep_size = 2GB
    synchronous_commit = remote_apply
    synchronous_standby_names = 'standby1'

    # Archive Settings (for PITR)
    archive_mode = on
    archive_command = 'test ! -f /pg_archive/%f && cp %p /pg_archive/%f'
    archive_timeout = 300

    # Performance Tuning
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB

    # Logging
    log_statement = 'all'
    log_duration = on
    log_min_duration_statement = 1000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-primary-hba
  namespace: default
data:
  pg_hba.conf: |
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            trust
    host    all             all             ::1/128                 trust
    host    replication     postgres        10.0.0.0/8              md5
    host    replication     postgres        ::1/128                 md5
    host    all             all             all                     md5

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: default
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      containers:
      - name: postgres
        image: postgres:14-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: mcp_games
        - name: POSTGRES_USER
          value: games_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql
        - name: postgres-archive
          mountPath: /pg_archive

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U games_user -d mcp_games
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U games_user -d mcp_games
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3

      volumes:
      - name: postgres-config
        configMap:
          name: postgres-primary-config
      - name: postgres-archive
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: default
spec:
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
    role: primary

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: default
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        role: replica
    spec:
      initContainers:
      - name: pg-basebackup
        image: postgres:14-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: password
        command:
        - /bin/sh
        - -c
        - |
          if [ ! -f /var/lib/postgresql/data/pgdata/PG_VERSION ]; then
            pg_basebackup -h postgres-primary-0.postgres-primary -D /var/lib/postgresql/data/pgdata -U postgres -v -P
          fi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

      containers:
      - name: postgres
        image: postgres:14-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_USER
          value: games_user

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: recovery-config
          mountPath: /var/lib/postgresql/data/pgdata

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U games_user
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      volumes:
      - name: recovery-config
        configMap:
          name: postgres-recovery-config

  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-recovery-config
  namespace: default
data:
  recovery.conf: |
    standby_mode = 'on'
    primary_conninfo = 'host=postgres-primary-0.postgres-primary port=5432 user=postgres password=postgres'
    recovery_target_timeline = 'latest'

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: default
type: Opaque
stringData:
  password: secure_password_change_me
  superuser-password: secure_superuser_password

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: default
spec:
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
    role: replica

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
